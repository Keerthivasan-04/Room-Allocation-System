# ================================================================
# application.properties ? NestManager Backend Configuration
# ================================================================

# ----------------------------------------------------------------
# Server
# ----------------------------------------------------------------
server.port=8080

# ----------------------------------------------------------------
# MySQL Database
# Change the values below to match your local MySQL setup
# ----------------------------------------------------------------
spring.datasource.url=jdbc:mysql://mysql.railway.internal:3306/railway
spring.datasource.username=root
spring.datasource.password=sUDoaZjsRAAgCVhsqfEeZpdZUxWUDXmd
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----------------------------------------------------------------
# JPA / Hibernate
# ----------------------------------------------------------------
# update  ? auto-creates/updates tables on startup (good for development)
# validate ? only validates schema (use for production)
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ----------------------------------------------------------------
# JWT
# ----------------------------------------------------------------
# Secret key ? change this to a long random string in production
# Minimum 256 bits (32 characters) for HS256 algorithm
nestmanager.jwt.secret=nestmanager_super_secret_key_change_this_in_production_2025
nestmanager.jwt.expiration=86400000
# 86400000 ms = 24 hours

# ----------------------------------------------------------------
# Logging
# ----------------------------------------------------------------
logging.level.com.nestmanager=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# ----------------------------------------------------------------
# Scheduling (for rent reminders, checkout alerts)
# ----------------------------------------------------------------
spring.task.scheduling.pool.size=2

# ----------------------------------------------------------------
# Jackson (JSON serialization)
# ----------------------------------------------------------------
# Ignore null fields in JSON responses
spring.jackson.default-property-inclusion=non_null
