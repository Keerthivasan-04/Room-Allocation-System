<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NestManager — Notifications</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="notifications.css" />
</head>

<body>

    <!-- ===================== SIDEBAR ===================== -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <div class="sidebar-logo">
                <div class="logo-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </svg>
                </div>
                <span class="logo-text">Nest<em>Manager</em></span>
            </div>
            <nav class="sidebar-nav" aria-label="Main navigation">
                <span class="nav-section-label">Main</span>
                <a href="../dashboard/dashboard.html" class="nav-item"><span class="nav-icon"><svg width="16"
                            height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="7" height="7" />
                            <rect x="14" y="3" width="7" height="7" />
                            <rect x="14" y="14" width="7" height="7" />
                            <rect x="3" y="14" width="7" height="7" />
                        </svg></span><span class="nav-label">Dashboard</span></a>
                <a href="../rooms/rooms.html" class="nav-item"><span class="nav-icon"><svg width="16" height="16"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                            <polyline points="9 22 9 12 15 12 15 22" />
                        </svg></span><span class="nav-label">Rooms &amp; Beds</span></a>
                <a href="../tenants/tenants.html" class="nav-item"><span class="nav-icon"><svg width="16" height="16"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                            <circle cx="9" cy="7" r="4" />
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                        </svg></span><span class="nav-label">Tenants</span></a>
                <a href="../bookings/bookings.html" class="nav-item"><span class="nav-icon"><svg width="16" height="16"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                            <line x1="16" y1="2" x2="16" y2="6" />
                            <line x1="8" y1="2" x2="8" y2="6" />
                            <line x1="3" y1="10" x2="21" y2="10" />
                        </svg></span><span class="nav-label">Bookings</span></a>
                <span class="nav-section-label">Finance</span>
                <a href="../payments/payments.html" class="nav-item"><span class="nav-icon"><svg width="16" height="16"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="1" x2="12" y2="23" />
                            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                        </svg></span><span class="nav-label">Payments</span></a>
                <a href="../reports/reports.html" class="nav-item"><span class="nav-icon"><svg width="16" height="16"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="20" x2="18" y2="10" />
                            <line x1="12" y1="20" x2="12" y2="4" />
                            <line x1="6" y1="20" x2="6" y2="14" />
                        </svg></span><span class="nav-label">Reports</span></a>
                <span class="nav-section-label">System</span>
                <a href="notifications.html" class="nav-item active"><span class="nav-icon"><svg width="16" height="16"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                        </svg></span><span class="nav-label">Notifications</span></a>
                <a href="../settings/settings.html" class="nav-item"><span class="nav-icon"><svg width="16" height="16"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3" />
                            <path
                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                        </svg></span><span class="nav-label">Settings</span></a>
            </nav>
        </div>
        <div class="sidebar-user">
            <div class="user-avatar" id="user-avatar">--</div>
            <div class="user-info"><span class="user-name" id="user-name">Loading...</span><span class="user-role"
                    id="user-role">--</span></div>
            <button class="logout-btn" id="logout-btn" title="Sign out"><svg width="15" height="15" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg></button>
        </div>
    </aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- ===================== MAIN ===================== -->
    <div class="main-wrap">
        <header class="topbar">
            <button class="menu-toggle" id="menu-toggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                </svg></button>
            <div class="topbar-title">Notifications</div>
            <div class="topbar-right">
                <div class="topbar-date" id="topbar-date"></div>
                <button class="topbar-icon-btn" id="refresh-btn" title="Refresh"><svg width="15" height="15"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10" />
                        <polyline points="1 20 1 14 7 14" />
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
                    </svg></button>
            </div>
        </header>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Notifications</h1>
                    <p class="page-sub" id="page-sub">Stay updated on rent, bookings and alerts</p>
                </div>
                <div class="page-actions">
                    <button class="btn btn-secondary" id="mark-all-btn">Mark All Read</button>
                    <button class="btn btn-danger btn-sm" id="clear-all-btn">Clear All</button>
                </div>
            </div>

            <!-- Filter tabs -->
            <div class="notif-tabs">
                <button class="ntab active" data-filter="ALL">All <span class="ntab-count"
                        id="cnt-all">0</span></button>
                <button class="ntab" data-filter="RENT">Rent Due <span class="ntab-count ntab-count--red"
                        id="cnt-rent">0</span></button>
                <button class="ntab" data-filter="CHECKOUT">Check-out <span class="ntab-count ntab-count--yellow"
                        id="cnt-checkout">0</span></button>
                <button class="ntab" data-filter="BOOKING">Bookings <span class="ntab-count ntab-count--blue"
                        id="cnt-booking">0</span></button>
                <button class="ntab" data-filter="SYSTEM">System <span class="ntab-count"
                        id="cnt-system">0</span></button>
            </div>

            <!-- Notifications list -->
            <div class="notif-panel" id="notif-panel">
                <!-- populated by JS -->
            </div>

            <!-- Empty state -->
            <div class="empty-state hidden" id="empty-state">
                <div class="empty-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                    </svg>
                </div>
                <h3 class="empty-title">No notifications</h3>
                <p class="empty-sub">You're all caught up!</p>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toast-container" aria-live="polite"></div>
    <script src="notifications.js"></script>
</body>

</html>
